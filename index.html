<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bot Battle 2026">
<meta name="theme-color" content="#0a0a0f">
<title>BOT BATTLE 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #111118; --card: #1a1a25; --border: #2a2a3d;
    --accent: #f0e040; --accent2: #40e0f0; --accent3: #f040a0;
    --text: #e8e8f0; --muted: #6a6a8a; --success: #40f080; --danger: #f04040;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { height:-webkit-fill-available; }
  body {
    background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif;
    min-height:100vh; min-height:-webkit-fill-available; overflow-x:hidden;
    -webkit-font-smoothing:antialiased; -webkit-text-size-adjust:100%;
    padding-top:env(safe-area-inset-top,0px);
    padding-bottom:env(safe-area-inset-bottom,20px);
    padding-left:env(safe-area-inset-left,0px);
    padding-right:env(safe-area-inset-right,0px);
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%,rgba(240,224,64,.06) 0%,transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 90%,rgba(64,224,240,.05) 0%,transparent 60%),
      radial-gradient(ellipse 40% 50% at 50% 50%,rgba(240,64,160,.03) 0%,transparent 60%);
    pointer-events:none; z-index:0;
  }
  body::after {
    content:''; position:fixed; inset:0;
    background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
    background-size:50px 50px; pointer-events:none; z-index:0;
  }
  .container { position:relative; z-index:1; max-width:680px; margin:0 auto; padding:0 16px 48px; }

  header { text-align:center; padding:32px 16px 24px; }
  .logo-tag { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:3px; color:var(--accent); text-transform:uppercase; margin-bottom:10px; opacity:.8; }
  h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(60px,20vw,110px); letter-spacing:6px; line-height:.9; background:linear-gradient(135deg,#f0e040 0%,#fff 50%,#40e0f0 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .subtitle { font-size:12px; color:var(--muted); letter-spacing:2px; margin-top:10px; font-weight:300; }

  .categories { display:flex; flex-direction:column; gap:10px; margin:20px 0; }
  .cat-btn {
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    padding:16px 18px; cursor:pointer; transition:transform .12s,box-shadow .12s;
    text-align:left; position:relative; overflow:hidden;
    display:flex; align-items:center; gap:14px;
    min-height:68px; width:100%; -webkit-appearance:none;
  }
  .cat-btn::before { content:''; position:absolute; top:0; left:0; bottom:0; width:4px; border-radius:14px 0 0 14px; transition:opacity .2s; opacity:0; }
  .cat-btn:nth-child(1)::before { background:var(--accent); }
  .cat-btn:nth-child(2)::before { background:var(--accent2); }
  .cat-btn:nth-child(3)::before { background:var(--accent3); }
  .cat-btn.active::before { opacity:1; }
  .cat-btn.active { border-color:transparent; }
  .cat-btn:nth-child(1).active { box-shadow:0 4px 20px rgba(240,224,64,.18); }
  .cat-btn:nth-child(2).active { box-shadow:0 4px 20px rgba(64,224,240,.18); }
  .cat-btn:nth-child(3).active { box-shadow:0 4px 20px rgba(240,64,160,.18); }
  .cat-btn:active { transform:scale(.97); }
  .cat-num { font-family:'Bebas Neue',sans-serif; font-size:38px; line-height:1; flex-shrink:0; width:40px; }
  .cat-btn:nth-child(1) .cat-num { color:var(--accent); }
  .cat-btn:nth-child(2) .cat-num { color:var(--accent2); }
  .cat-btn:nth-child(3) .cat-num { color:var(--accent3); }
  .cat-text { flex:1; min-width:0; }
  .cat-title { font-family:'Space Mono',monospace; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text); font-weight:700; }
  .cat-desc { font-size:12px; color:var(--muted); margin-top:3px; line-height:1.4; }
  .cat-arrow { color:var(--muted); font-size:20px; flex-shrink:0; transition:transform .2s,color .2s; font-weight:300; }
  .cat-btn.active .cat-arrow { transform:rotate(90deg); }
  .cat-btn:nth-child(1).active .cat-arrow { color:var(--accent); }
  .cat-btn:nth-child(2).active .cat-arrow { color:var(--accent2); }
  .cat-btn:nth-child(3).active .cat-arrow { color:var(--accent3); }

  .panel { display:none; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:18px 16px; margin-top:6px; margin-bottom:8px; animation:slideIn .22s ease; }
  .panel.active { display:block; }
  @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .panel-header { margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid var(--border); }
  .panel-header-row { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
  .panel-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px; }
  .panel-actions { display:flex; gap:8px; flex-wrap:wrap; }

  .btn { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; padding:12px 16px; border:none; border-radius:8px; cursor:pointer; transition:opacity .12s,transform .1s; font-weight:700; min-height:44px; display:inline-flex; align-items:center; justify-content:center; -webkit-appearance:none; white-space:nowrap; }
  .btn:active { opacity:.7; transform:scale(.96); }
  .btn-primary { background:var(--accent); color:#000; }
  .btn-blue    { background:var(--accent2); color:#000; }
  .btn-pink    { background:var(--accent3); color:#fff; }
  .btn-ghost   { background:transparent; color:var(--muted); border:1px solid var(--border); }
  .btn-lg      { font-size:13px; padding:16px 36px; letter-spacing:2px; min-height:54px; border-radius:12px; }

  .question-item { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 14px; margin-bottom:10px; }
  .q-number { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--accent); text-transform:uppercase; margin-bottom:8px; }
  .q-text { font-size:15px; line-height:1.6; font-weight:500; margin-bottom:12px; }
  .answer-box { background:var(--bg); border:1px solid var(--border); border-left:3px solid var(--success); border-radius:8px; padding:12px 14px; font-size:14px; line-height:1.6; color:var(--success); display:none; margin-bottom:10px; }
  .answer-box.visible { display:block; animation:fadeIn .25s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .thesis-item { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 14px; margin-bottom:10px; }
  .thesis-text { font-size:15px; line-height:1.6; font-weight:500; margin-bottom:12px; }
  .verdict-box { display:none; margin-bottom:10px; }
  .verdict-box.visible { display:block; animation:fadeIn .25s ease; }
  .verdict-inner { display:flex; gap:10px; align-items:flex-start; }
  .verdict-badge { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; padding:4px 12px; border-radius:6px; flex-shrink:0; }
  .verdict-badge.true  { background:rgba(64,240,128,.15); color:var(--success); border:1px solid var(--success); }
  .verdict-badge.false { background:rgba(240,64,64,.15);  color:var(--danger);  border:1px solid var(--danger); }
  .verdict-explanation { font-size:13px; color:var(--muted); line-height:1.6; padding-top:2px; }

  .game-container { text-align:center; }
  .game-intro-text { color:var(--muted); font-size:14px; line-height:1.7; margin-bottom:28px; }
  .game-cats-display { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:16px 0; }
  .game-cat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 8px; text-align:center; }
  .game-cat-icon { font-size:26px; margin-bottom:6px; }
  .game-cat-label { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
  .game-cat-name { font-size:12px; font-weight:600; color:var(--text); line-height:1.3; }
  .letter-display { background:var(--surface); border:2px solid var(--accent3); border-radius:14px; padding:20px 28px; margin:14px auto; display:inline-block; min-width:140px; }
  .letter-label { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:4px; }
  .letter-big { font-family:'Bebas Neue',sans-serif; font-size:80px; line-height:1; color:var(--accent3); text-shadow:0 0 28px rgba(240,64,160,.4); }

  .timer-container { margin:16px 0; }
  .timer-ring { width:100px; height:100px; margin:0 auto; position:relative; }
  .timer-ring svg { transform:rotate(-90deg); width:100px; height:100px; }
  .timer-ring circle { fill:none; stroke-width:6; }
  .timer-bg { stroke:var(--border); }
  .timer-progress { stroke:var(--accent3); stroke-dasharray:339.29; stroke-dashoffset:0; stroke-linecap:round; transition:stroke-dashoffset 1s linear,stroke .5s; }
  .timer-text-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; }
  .timer-number { font-family:'Bebas Neue',sans-serif; font-size:40px; line-height:1; color:var(--accent3); }
  .timer-sub { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:2px; color:var(--muted); }
  .timer-expired { font-family:'Bebas Neue',sans-serif; font-size:26px; color:var(--danger); letter-spacing:3px; animation:pulse .5s ease infinite alternate; margin:12px 0 4px; }
  @keyframes pulse { from{opacity:1} to{opacity:.4} }

  .game-inactive { display:none; }
  .game-active   { display:block; }
  .game-btn-row  { display:flex; gap:10px; justify-content:center; margin-top:14px; flex-wrap:wrap; }

  .counter-badge {
    font-family:'Space Mono',monospace; font-size:9px; letter-spacing:1px;
    color:var(--muted); text-align:right; margin-bottom:12px; padding-right:2px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-tag">// Wissen · Thesen · Spiel</div>
    <h1>BOT<br>BATTLE</h1>
    <p class="subtitle">Wähle eine Kategorie</p>
  </header>

  <div class="categories">
    <button class="cat-btn" onclick="openPanel('wissen')">
      <div class="cat-num">01</div>
      <div class="cat-text">
        <div class="cat-title">Allgemeinwissen</div>
        <div class="cat-desc">5 zufällige Fragen aus verschiedenen Themen</div>
      </div>
      <div class="cat-arrow">›</div>
    </button>
    <button class="cat-btn" onclick="openPanel('thesen')">
      <div class="cat-num">02</div>
      <div class="cat-text">
        <div class="cat-title">Wahr oder Falsch</div>
        <div class="cat-desc">5 Thesen — richtig oder falsch einschätzen</div>
      </div>
      <div class="cat-arrow">›</div>
    </button>
    <button class="cat-btn" onclick="openPanel('spiel')">
      <div class="cat-num">03</div>
      <div class="cat-text">
        <div class="cat-title">Stadt Land Fluss+</div>
        <div class="cat-desc">3 Kategorien, 1 Buchstabe, 10 Sekunden</div>
      </div>
      <div class="cat-arrow">›</div>
    </button>
  </div>

  <!-- PANEL 1 -->
  <div class="panel" id="panel-wissen">
    <div class="panel-header">
      <div class="panel-header-row">
        <div class="panel-title" style="color:var(--accent)">ALLGEMEINWISSEN</div>
        <div class="panel-actions">
          <button class="btn btn-ghost" onclick="loadWissen()">↻ Neu</button>
          <button class="btn btn-primary" onclick="revealAll('wissen')">Alle Antworten</button>
        </div>
      </div>
    </div>
    <div id="wissen-content"></div>
  </div>

  <!-- PANEL 2 -->
  <div class="panel" id="panel-thesen">
    <div class="panel-header">
      <div class="panel-header-row">
        <div class="panel-title" style="color:var(--accent2)">WAHR ODER FALSCH</div>
        <div class="panel-actions">
          <button class="btn btn-ghost" onclick="loadThesen()">↻ Neu</button>
          <button class="btn btn-blue" onclick="revealAll('thesen')">Alle Antworten</button>
        </div>
      </div>
    </div>
    <div id="thesen-content"></div>
  </div>

  <!-- PANEL 3 -->
  <div class="panel" id="panel-spiel">
    <div class="panel-header">
      <div class="panel-title" style="color:var(--accent3)">STADT LAND FLUSS+</div>
    </div>
    <div class="game-container">
      <div id="game-start">
        <p class="game-intro-text">
          Beim Start: <strong style="color:var(--accent3)">3 zufällige Kategorien</strong> + <strong style="color:var(--accent3)">1 Buchstabe</strong>.<br>
          Du hast <strong style="color:var(--accent3)">10 Sekunden</strong> Denkzeit!
        </p>
        <button class="btn btn-pink btn-lg" onclick="startGame()">▶ SPIEL STARTEN</button>
      </div>
      <div id="game-active" class="game-inactive">
        <div class="game-cats-display" id="game-cats"></div>
        <div class="letter-display">
          <div class="letter-label">Buchstabe</div>
          <div class="letter-big" id="game-letter">?</div>
        </div>
        <div class="timer-container">
          <div class="timer-ring">
            <svg viewBox="0 0 120 120">
              <circle class="timer-bg" cx="60" cy="60" r="54"/>
              <circle class="timer-progress" id="timer-circle" cx="60" cy="60" r="54"/>
            </svg>
            <div class="timer-text-overlay">
              <div class="timer-number" id="timer-number">5</div>
              <div class="timer-sub">SEK</div>
            </div>
          </div>
        </div>
        <div id="timer-expired-msg" style="display:none">
          <div class="timer-expired">⏱ ZEIT ABGELAUFEN!</div>
        </div>
        <div class="game-btn-row">
          <button class="btn btn-pink" onclick="startGame()">↻ Neue Runde</button>
          <button class="btn btn-ghost" onclick="resetGame()">Zurück</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── FRAGEN-DATENBANK ───────────────────────────────────────────────────────
const FRAGEN_DB = [
  { frage:"Wie viele Knochen hat ein erwachsener Mensch?", antwort:"206 Knochen" },
  { frage:"Welches ist das flächenmäßig größte Land der Erde?", antwort:"Russland" },
  { frage:"In welchem Jahr fiel die Berliner Mauer?", antwort:"1989" },
  { frage:"Welches chemische Symbol hat Gold?", antwort:"Au (Aurum)" },
  { frage:"Wie heißt die Hauptstadt Australiens?", antwort:"Canberra" },
  { frage:"Welches ist das bevölkerungsreichste Land der Welt?", antwort:"Indien (seit 2023)" },
  { frage:"Wer malte die Mona Lisa?", antwort:"Leonardo da Vinci" },
  { frage:"Wie viele Planeten hat unser Sonnensystem?", antwort:"8 Planeten" },
  { frage:"In welchem Jahr begann der Erste Weltkrieg?", antwort:"1914" },
  { frage:"Wie heißt der höchste Berg der Welt?", antwort:"Mount Everest (8.849 m)" },
  { frage:"Welches Tier ist das schnellste Landtier der Welt?", antwort:"Der Gepard (bis 120 km/h)" },
  { frage:"Aus wie vielen Sternen besteht das Sternbild Großer Wagen?", antwort:"7 Sterne" },
  { frage:"Welches Element hat die Ordnungszahl 1?", antwort:"Wasserstoff (H)" },
  { frage:"Wie nennt man die Wissenschaft von den Sternen und dem Universum?", antwort:"Astronomie" },
  { frage:"In welcher Stadt steht der Eiffelturm?", antwort:"Paris, Frankreich" },
  { frage:"Wer schrieb das Theaterstück 'Hamlet'?", antwort:"William Shakespeare" },
  { frage:"Wie viele Saiten hat eine klassische Gitarre?", antwort:"6 Saiten" },
  { frage:"Welches ist das kleinste Land der Welt?", antwort:"Vatikanstadt" },
  { frage:"Wie viele Farben hat ein Regenbogen?", antwort:"7 Farben (Rot, Orange, Gelb, Grün, Blau, Indigo, Violett)" },
  { frage:"Welches Organ produziert Insulin?", antwort:"Die Bauchspeicheldrüse (Pankreas)" },
  { frage:"Wie heißt der längste Fluss der Welt?", antwort:"Der Nil (ca. 6.650 km)" },
  { frage:"In welchem Jahr landeten die ersten Menschen auf dem Mond?", antwort:"1969 (Apollo 11, 20. Juli)" },
  { frage:"Wie viele Zähne hat ein erwachsener Mensch normalerweise (ohne Weisheitszähne)?", antwort:"28 Zähne" },
  { frage:"Welches ist das leichteste Gas?", antwort:"Wasserstoff" },
  { frage:"Wer erfand das Telefon?", antwort:"Alexander Graham Bell (1876)" },
  { frage:"Wie heißt die Währung Japans?", antwort:"Yen (¥)" },
  { frage:"Welcher Planet ist der Sonne am nächsten?", antwort:"Merkur" },
  { frage:"In welchem Land wurde Mozart geboren?", antwort:"Österreich (Salzburg, 1756)" },
  { frage:"Wie viele Kontinente gibt es auf der Erde?", antwort:"7 Kontinente" },
  { frage:"Was ist die Hauptstadt Kanadas?", antwort:"Ottawa" },
  { frage:"Welches Tier hat das größte Herz aller Lebewesen?", antwort:"Der Blauwal" },
  { frage:"Wie nennt man den Schnittpunkt von Längen- und Breitengrad 0°/0°?", antwort:"Null-Punkt (Golf von Guinea, Atlantik)" },
  { frage:"Welches chemische Element hat das Symbol 'Fe'?", antwort:"Eisen (Ferrum)" },
  { frage:"Wie viele Buchstaben hat das deutsche Alphabet?", antwort:"26 Buchstaben (+ 4 Sonderzeichen: Ä, Ö, Ü, ß)" },
  { frage:"Wer war der erste Mensch im Weltall?", antwort:"Juri Gagarin (12. April 1961)" },
  { frage:"Wie heißt die längste Eisenbahn der Welt?", antwort:"Die Transsibirische Eisenbahn (ca. 9.288 km)" },
  { frage:"Welches Land hat die längste Küstenlinie der Welt?", antwort:"Kanada" },
  { frage:"Wie viele Herzkammern hat ein menschliches Herz?", antwort:"4 (zwei Vorhöfe, zwei Kammern)" },
  { frage:"Wer schrieb 'Die Verwandlung'?", antwort:"Franz Kafka (1915)" },
  { frage:"Welches ist das schwerste natürlich vorkommende Element?", antwort:"Osmium" },
  { frage:"In welchem Meer liegt die Insel Kreta?", antwort:"Im Mittelmeer (Ägäisches Meer)" },
  { frage:"Wie nennt man den Prozess, bei dem Pflanzen Licht in Energie umwandeln?", antwort:"Photosynthese" },
  { frage:"Welche Stadt war die erste Hauptstadt des vereinten Deutschlands?", antwort:"Frankfurt am Main (1848/49 Paulskirche), dann Berlin (offiziell ab 1871)" },
  { frage:"Wie viele Augen hat eine Spinne typischerweise?", antwort:"8 Augen" },
  { frage:"Wer komponierte die 9. Symphonie mit dem 'Ode an die Freude'-Chor?", antwort:"Ludwig van Beethoven" },
  { frage:"Welches Land verbrauchte historisch am meisten Schokolade pro Kopf?", antwort:"Die Schweiz" },
  { frage:"Wie heißt die chemische Verbindung H₂O?", antwort:"Wasser" },
  { frage:"Welches ist das größte Organ des menschlichen Körpers?", antwort:"Die Haut" },
  { frage:"In welcher Stadt fanden die ersten modernen Olympischen Spiele 1896 statt?", antwort:"Athen, Griechenland" },
  { frage:"Wie viele Seiten hat ein Würfel?", antwort:"6 Seiten" },
  { frage:"Welches ist das älteste noch genutzte Parlament der Welt?", antwort:"Das Althing (Island, gegründet 930 n. Chr.)" },
];

// ─── THESEN-DATENBANK ──────────────────────────────────────────────────────
const THESEN_DB = [
  { these:"Blitze können denselben Ort zweimal treffen.", wahr:true, erklaerung:"Blitze treffen hohe Objekte wie Türme oder Bäume regelmäßig mehrfach — der Eiffelturm wird z.B. ca. 300-mal pro Jahr getroffen." },
  { these:"Das menschliche Gehirn nutzt nur 10 % seiner Kapazität.", wahr:false, erklaerung:"Dies ist ein weit verbreiteter Mythos. Bildgebende Verfahren zeigen, dass praktisch alle Bereiche des Gehirns aktiv genutzt werden." },
  { these:"Die Große Mauer Chinas ist vom Mond aus mit bloßem Auge sichtbar.", wahr:false, erklaerung:"Das ist ein bekannter Mythos. Die Mauer ist zu schmal (ca. 5–8 m breit), um vom Mond aus gesehen zu werden — sogar Astronauten haben dies bestätigt." },
  { these:"Ein Chamäleon wechselt seine Farbe hauptsächlich zur Tarnung.", wahr:false, erklaerung:"Chamäleons verändern ihre Farbe vor allem zur Kommunikation und Stimmungsanzeige sowie zur Thermoregulation, nicht primär zur Tarnung." },
  { these:"Wasser leitet keinen elektrischen Strom — reines Wasser ist ein Isolator.", wahr:true, erklaerung:"Chemisch reines Wasser (destilliertes Wasser) leitet kaum Strom. Erst gelöste Mineralien und Salze machen normales Wasser leitfähig." },
  { these:"Haie sind die häufigste Todesursache für Menschen im Meer.", wahr:false, erklaerung:"Quallen töten weltweit mehr Menschen als Haie. Tatsächlich sterben auch deutlich mehr Menschen durch Krokodile, Flusspferde oder Ertrinken." },
  { these:"Der Mond ist der einzige natürliche Satellit der Erde.", wahr:true, erklaerung:"Die Erde hat nur einen einzigen natürlichen Satelliten: den Mond. Es gibt zwar sogenannte Quasi-Satelliten, aber keine weiteren echten Monde." },
  { these:"Spinnen sind Insekten.", wahr:false, erklaerung:"Spinnen gehören zu den Spinnentieren (Arachnida), nicht zu den Insekten. Insekten haben 6 Beine und 3 Körperabschnitte — Spinnen haben 8 Beine und 2 Abschnitte." },

  { these:"In manchen Ländern ist es legal, auf der Straße Falschgeld zu benutzen, solange man es als Fake kennzeichnet.", wahr:false, erklaerung:"Die Herstellung und Verwendung von Falschgeld ist weltweit strafbar, unabhängig von Kennzeichnungen. Es gibt keine Ausnahmen für 'Spielgeld' im echten Zahlungsverkehr." },
  { these:"Bäume atmen nachts CO₂ aus, weil keine Photosynthese stattfindet.", wahr:true, erklaerung:"Nachts ohne Licht können Pflanzen keine Photosynthese betreiben und geben durch Zellatmung CO₂ ab — tagsüber überwiegt die CO₂-Aufnahme durch Photosynthese." },

  { these:"Clownfische können ihr Geschlecht wechseln.", wahr:true, erklaerung:"Clownfische sind sequentielle Hermaphroditen. Stirbt das dominante Weibchen einer Gruppe, kann das ranghöchste Männchen zum Weibchen werden — genau wie in 'Findet Nemo'." },
  { these:"Die Sonne ist ein Planet.", wahr:false, erklaerung:"Die Sonne ist ein Stern — ein gigantischer Gasball, der durch Kernfusion Energie erzeugt. Planeten hingegen umkreisen Sterne und erzeugen kein eigenes Licht durch Fusion." },
  { these:"Napoleon Bonaparte war außergewöhnlich klein.", wahr:false, erklaerung:"Napoleon war ca. 1,69 m groß — für seine Zeit durchschnittlich. Der Mythos entstand durch eine Verwechslung von französischen und englischen Maßeinheiten sowie britische Propaganda." },
  { these:"Bananen sind botanisch gesehen Beeren.", wahr:true, erklaerung:"Nach botanischer Definition sind Bananen echte Beeren (Früchte aus einem Fruchtknoten), während Erdbeeren keine echten Beeren sind, sondern Scheinfrüchte." },
  { these:"Das menschliche Auge kann mehr Grüntöne unterscheiden als Rottöne.", wahr:true, erklaerung:"Das liegt daran, dass das Auge in der Mitte des Spektrums (Grün) am empfindlichsten ist. Evolutionär war es wichtig, Vegetation zu unterscheiden." },

// ─── SPIEL-KATEGORIEN ──────────────────────────────────────────────────────
const GAME_CATEGORIES = [
  { name:'Stadt', icon:'🏙️' }, { name:'Land', icon:'🗺️' },
  { name:'Fluss', icon:'🌊' }, { name:'Tier', icon:'🐾' },
  { name:'Pflanze', icon:'🌿' }, { name:'Beruf', icon:'💼' },
  { name:'Sportart', icon:'⚽' }, { name:'Film/Serie', icon:'🎬' },
  { name:'Essen & Trinken', icon:'🍽️' }, { name:'Musikband', icon:'🎸' },
  { name:'Farbe', icon:'🎨' }, { name:'Marke', icon:'🏷️' },
  { name:'Berühmte Person', icon:'⭐' }, { name:'Videospiel', icon:'🎮' },
  { name:'Automarke', icon:'🚗' }, { name:'Körperteil', icon:'🫀' },
  { name:'Werkzeug', icon:'🔧' }, { name:'Kleidungsstück', icon:'👔' },
  { name:'Hauptstadt', icon:'🏛️' }, { name:'Buch/Autor', icon:'📚' },
  { name:'Musikinstrument', icon:'🎵' }, { name:'Süßigkeit', icon:'🍬' },
  { name:'Computerspiel', icon:'🕹️' }, { name:'Superheld', icon:'🦸' },
  { name:'Naturphänomen', icon:'⚡' },
];

const LETTERS = 'ABCDEFGHIJKLMNOPRSTW'.split('');
const CIRCUMFERENCE = 2 * Math.PI * 54;
let timerInterval = null;
let activePanel = null;

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
function pick(arr, n) { return shuffle(arr).slice(0, n); }

// ─── PANEL LOGIC ───────────────────────────────────────────────────────────
function openPanel(id) {
  const wasActive = activePanel === id;
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  if (wasActive) { activePanel = null; return; }
  activePanel = id;
  document.getElementById('panel-' + id).classList.add('active');
  document.querySelectorAll('.cat-btn')[['wissen','thesen','spiel'].indexOf(id)].classList.add('active');
  if (id === 'wissen') loadWissen();
  if (id === 'thesen') loadThesen();
  setTimeout(() => {
    document.getElementById('panel-' + id).scrollIntoView({ behavior:'smooth', block:'start' });
  }, 80);
}

// ─── WISSEN ────────────────────────────────────────────────────────────────
function loadWissen() {
  const items = pick(FRAGEN_DB, 5);
  const el = document.getElementById('wissen-content');
  el.innerHTML = `<div class="counter-badge">${FRAGEN_DB.length} Fragen im Pool · 5 zufällig gewählt</div>` +
    items.map((item, i) => `
      <div class="question-item">
        <div class="q-number">Frage ${i+1} / 5</div>
        <div class="q-text">${item.frage}</div>
        <div class="answer-box" id="w-ans-${i}">✓ ${item.antwort}</div>
        <button class="btn btn-ghost" style="font-size:10px;padding:10px 14px" onclick="toggleAnswer('w-ans-${i}',this)">Antwort anzeigen</button>
      </div>`).join('');
}

// ─── THESEN ────────────────────────────────────────────────────────────────
function loadThesen() {
  const items = pick(THESEN_DB, 5);
  const el = document.getElementById('thesen-content');
  el.innerHTML = `<div class="counter-badge">${THESEN_DB.length} Thesen im Pool · 5 zufällig gewählt</div>` +
    items.map((item, i) => `
      <div class="thesis-item">
        <div class="q-number" style="color:var(--accent2)">These ${i+1} / 5</div>
        <div class="thesis-text">${item.these}</div>
        <div class="verdict-box" id="t-ans-${i}">
          <div class="verdict-inner">
            <div class="verdict-badge ${item.wahr?'true':'false'}">${item.wahr?'WAHR':'FALSCH'}</div>
            <div class="verdict-explanation">${item.erklaerung}</div>
          </div>
        </div>
        <button class="btn btn-ghost" style="font-size:10px;padding:10px 14px" onclick="toggleAnswer('t-ans-${i}',this)">Antwort anzeigen</button>
      </div>`).join('');
}

// ─── ANTWORT TOGGLE ────────────────────────────────────────────────────────
function toggleAnswer(id, btn) {
  const box = document.getElementById(id);
  box.classList.toggle('visible');
  btn.textContent = box.classList.contains('visible') ? 'Verbergen' : 'Antwort anzeigen';
}

function revealAll(type) {
  if (type === 'wissen') {
    document.querySelectorAll('[id^="w-ans-"]').forEach(el => el.classList.add('visible'));
    document.querySelectorAll('#wissen-content .btn-ghost').forEach(b => b.textContent = 'Verbergen');
  } else {
    document.querySelectorAll('[id^="t-ans-"]').forEach(el => el.classList.add('visible'));
    document.querySelectorAll('#thesen-content .btn-ghost').forEach(b => b.textContent = 'Verbergen');
  }
}

// ─── SPIEL ─────────────────────────────────────────────────────────────────
function startGame() {
  if (timerInterval) clearInterval(timerInterval);
  document.getElementById('game-start').style.display = 'none';
  document.getElementById('game-active').className = 'game-active';
  document.getElementById('timer-expired-msg').style.display = 'none';

  const cats = pick(GAME_CATEGORIES, 3);
  const letter = LETTERS[Math.floor(Math.random() * LETTERS.length)];
  document.getElementById('game-letter').textContent = letter;
  document.getElementById('game-cats').innerHTML = cats.map(c => `
    <div class="game-cat-card">
      <div class="game-cat-icon">${c.icon}</div>
      <div class="game-cat-label">Kategorie</div>
      <div class="game-cat-name">${c.name}</div>
    </div>`).join('');

  let timeLeft = 11;
  const circle = document.getElementById('timer-circle');
  const numberEl = document.getElementById('timer-number');
  circle.style.strokeDasharray = CIRCUMFERENCE;
  circle.style.strokeDashoffset = 0;
  circle.style.stroke = 'var(--accent3)';
  numberEl.style.color = 'var(--accent3)';
  numberEl.textContent = 10;

  timerInterval = setInterval(() => {
    timeLeft--;
    numberEl.textContent = timeLeft;
    circle.style.strokeDashoffset = CIRCUMFERENCE * ((11 - timeLeft) / 10);
    if (timeLeft <= 2) { circle.style.stroke = 'var(--danger)'; numberEl.style.color = 'var(--danger)'; }
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      numberEl.textContent = '0';
      document.getElementById('timer-expired-msg').style.display = 'block';
    }
  }, 1000);
}

function resetGame() {
  if (timerInterval) clearInterval(timerInterval);
  document.getElementById('game-start').style.display = 'block';
  document.getElementById('game-active').className = 'game-inactive';
  document.getElementById('timer-expired-msg').style.display = 'none';
}
</script>
